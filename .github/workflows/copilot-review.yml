name: Copilot 自动审查与合并（传统）

on:
  workflow_run:
    workflows: ["SNH48 Skill CI 测试"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  # 注：推荐使用 copilot-agent-review.yml，此工作流为备选方案
  post-test-comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: 发送审查通过评论
        uses: actions/github-script@v7
        with:
          script: |
            console.log('✅ CI 测试通过，已发送审查消息');
            console.log('💡 提示：已配置 Copilot Agent 自动审查，见 copilot-agent-review.yml');

  check-merge-readiness:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 查找关联的 PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'updated',
              direction: 'desc',
            });

            if (prs.data.length > 0) {
              const pr = prs.data[0];
              console.log(`找到 PR #${pr.number}: ${pr.title}`);
              core.setOutput('pr_number', pr.number);
            }

      - name: 检查 PR 合并就绪状态
        if: steps.find-pr.outputs.pr_number
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.pr_number }}');
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            console.log('📋 PR 合并检查:');
            console.log(`  PR #${prNumber}: ${pr.data.title}`);
            console.log(`  mergeable: ${pr.data.mergeable}`);
            console.log(`  draft: ${pr.data.draft}`);
            console.log(`  base: ${pr.data.base.ref}`);

            if (pr.data.mergeable && !pr.data.draft) {
              console.log('✅ 符合技术合并条件');
            } else {
              console.log('⚠️  暂不符合合并条件');
            }
